<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary meta ─────────────────────────────────────── -->
    <title>Swindon Airsoft — Book Events, Gear & More</title>
    <meta name="description" content="Swindon Airsoft — book your game day, manage your player profile, browse the armoury, and more. Wiltshire's premier airsoft field." />
    <meta name="theme-color" content="#080a06" />
    <link rel="canonical" href="https://www.swindon-airsoft.com/" />

    <!-- ── Favicon ───────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn) ─────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Swindon Airsoft" />
    <meta property="og:url"         content="https://www.swindon-airsoft.com/" />
    <meta property="og:title"       content="Swindon Airsoft — Book Events, Gear & More" />
    <meta property="og:description" content="Book your next game day, gear up in the armoury, and manage your player profile — all in one place. Wiltshire's premier airsoft field." />
    <meta property="og:image"       content="https://res.cloudinary.com/dhoqkkvsw/image/upload/v1773516780/og-image_t6wnq0.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="Swindon Airsoft — players in action on the field" />
    <meta property="og:locale"      content="en_GB" />

    <!-- ── Twitter / X Card ─────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Swindon Airsoft — Book Events, Gear & More" />
    <meta name="twitter:description" content="Book your next game day, gear up in the armoury, and manage your player profile — all in one place." />
    <meta name="twitter:image"       content="https://res.cloudinary.com/dhoqkkvsw/image/upload/v1773516780/og-image_t6wnq0.jpg" />
    <meta name="twitter:image:alt"   content="Swindon Airsoft — players in action on the field" />

    <!-- ── Google / SEO ─────────────────────────────────────── -->
    <meta name="robots"  content="index, follow" />
    <meta name="author"  content="Swindon Airsoft" />
    <meta name="keywords" content="airsoft, swindon, airsoft field, book airsoft, wiltshire airsoft, airsoft events, airsoft gear" />

    <!-- ── Preconnects ───────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://supabase.co" />

    <!-- ── Hero image preload (LCP element) ─────────────────── -->
    <link rel="preload" as="image" href="https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=1200&q=75&auto=format&fit=crop" fetchpriority="high" />

    <!-- ── Fonts (non-blocking) ──────────────────────────────── -->
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet" /></noscript>

    <!-- ── Font fallback (prevents FOUT flash) ───────────────── -->
    <style>
      body { font-family: 'Arial Narrow', Arial, sans-serif; }
    </style>
  </head>
  <body>
    <!-- ── Instant above-fold skeleton (visible before JS loads) -->
    <div id="root">
      <div style="min-height:100vh;background:#080a06;display:flex;align-items:center;justify-content:center;">
        <div style="text-align:center;padding:40px 20px;">
          <div style="width:60px;height:60px;border:3px solid #4a7c20;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;"></div>
          <div style="color:#4a7c20;font-family:Arial Narrow,Arial,sans-serif;font-size:13px;letter-spacing:.3em;text-transform:uppercase;">Loading</div>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
